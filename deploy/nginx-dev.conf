upstream petal_backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1024;

    # Max upload size (for skin analysis images)
    client_max_body_size 12M;

    # ── 通用代理头（复用） ─────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection        "";

    # ── API 入口 ──────────────────────────────────────
    location /api/ {
        proxy_pass http://petal_backend;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # ── Swagger / ReDoc 文档 ──────────────────────────
    location /docs {
        proxy_pass http://petal_backend/docs;
    }

    location /redoc {
        proxy_pass http://petal_backend/redoc;
    }

    # OpenAPI schema（Swagger 页面加载需要）
    location /api/v1/openapi.json {
        proxy_pass http://petal_backend/api/v1/openapi.json;
    }

    # ── 健康检查 ──────────────────────────────────────
    location /health {
        proxy_pass http://petal_backend/health;
        access_log off;
    }

    # ── 根路径 → 代理到后端，返回服务导航信息 ─────────
    location / {
        proxy_pass http://petal_backend/;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }
}
