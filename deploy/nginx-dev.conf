upstream petal_backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_types application/json application/javascript text/css;
    gzip_min_length 1024;

    # Max upload size (for skin analysis images)
    client_max_body_size 12M;

    # API proxy
    location /api/ {
        proxy_pass http://petal_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # Swagger docs
    location /docs {
        proxy_pass http://petal_backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc {
        proxy_pass http://petal_backend/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://petal_backend/api/v1/openapi.json;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://petal_backend/health;
        access_log off;
    }

    location / {
        return 200 '{"message": "Petal API Gateway"}';
        add_header Content-Type application/json;
    }
}
