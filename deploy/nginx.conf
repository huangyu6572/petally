upstream petal_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name api.petal.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.petal.example.com;

    # SSL
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Security Headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Max upload size (for skin analysis images)
    client_max_body_size 12M;

    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://petal_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;   # AI analysis may take up to 60s
        proxy_send_timeout 30s;
    }

    # Health check endpoint (no rate limit)
    location /health {
        proxy_pass http://petal_backend/health;
    }

    # Swagger docs (dev only, disable in production)
    location /docs {
        proxy_pass http://petal_backend/docs;
    }

    location /redoc {
        proxy_pass http://petal_backend/redoc;
    }
}
